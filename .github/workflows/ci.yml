name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  server:
    name: FastAPI server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install server with dev dependencies
        run: python -m pip install -e "apps/server[dev]" pyright

      - name: Run server tests
        working-directory: apps/server
        run: python -m pytest

      - name: Run pyright
        run: pyright

  web:
    name: Web dashboard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run lint
        working-directory: apps/web
        run: npm run lint

      - name: Run typecheck
        working-directory: apps/web
        run: npm run typecheck

      - name: Run contract tests
        working-directory: apps/web
        run: npm run test
