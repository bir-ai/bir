name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  server:
    name: FastAPI server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The contract tests must run against the SDK as it exists now, not the
      # last PyPI release. Install bir-sdk from source first so the >=0.2.0 pin
      # in apps/server[dev] is satisfied by the current SDK (which emits
      # metadata.service and metadata.source). Remove this step once bir-sdk
      # 0.2.0 is published to PyPI.
      - name: Install bir-sdk from source
        run: python -m pip install "bir-sdk @ git+https://github.com/bir-ai/bir-python.git@main"

      - name: Install server with dev dependencies
        run: python -m pip install -e "apps/server[dev]" pyright

      - name: Run server tests
        working-directory: apps/server
        run: python -m pytest

      - name: Run pyright
        run: pyright

  web:
    name: Web dashboard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run lint
        working-directory: apps/web
        run: npm run lint

      - name: Run typecheck
        working-directory: apps/web
        run: npm run typecheck

      - name: Run contract tests
        working-directory: apps/web
        run: npm run test

  fixtures:
    name: Contract fixture drift guard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Stdlib-only; no install step. Fails if a shared fixture no longer
      # matches tests/fixtures/CHECKSUMS.sha256. Keep this identical to the
      # bir-python (SDK) repo's fixtures job. See tests/fixtures/README.md.
      - name: Verify shared contract fixtures match the committed manifest
        run: python scripts/fixtures.py check
